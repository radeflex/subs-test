services:
  postgres:
    container_name: postgres-subs-test
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
      PG_DATA: /var/lib/postgresql/data
      POSTGRES_DB: subs-test
    volumes:
      - postgres:/data/postgres
    networks:
      - spring
    ports:
      - "5432:5432"
    restart: unless-stopped
  subs-test:
    container_name: subs-test
    image: ghcr.io/radeflex/subs-test:latest
    ports:
      - "8080:8080"
    networks:
      - spring
    depends_on:
      - postgres
networks:
  spring:
    driver: bridge
volumes:
  postgres:
    driver: local